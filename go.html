<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mystyle.css">
    <script src="https://kit.fontawesome.com/337be747ec.js" crossorigin="anonymous"></script>
    
    <title>My Restaurant</title>
</head>
<body>

    <header class="site-init">
        <div>
            <i class="fa-solid fa-bars"></i>
        </div>
        <div>
            <h1>Midnight Ramen</h1>

        </div>

        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a class="link-hl" href="go.html">To go</a>
        </nav>
        <div>
            <i class="fa-solid fa-cart-arrow-down"></i>
        </div>
    </header>

    <main class="container">
        <div class="form-flex">
            <div class="dish-month-img2">
                <img src="img/ramen3.png" alt="ramen">
            </div>
            <div class="form-container">
                <h2>Order To Go</h2>
            <form>
                <div class="input-control">
                    <label>Select Dish</label>
                    <select>
                        <option value="Tonkotsu Ramen">Tonkotsu Ramen</option>
                        <option value="Shoyu Ramen">Shoyu Ramen</option>
                        <option value="Miso Ramen">Miso Ramen</option>
                        <option value="Shio Ramen">Shio Ramen</option>
                        <option value="Spicy Garlic Ramen">Spicy Garlic Ramen</option>
                    </select>
                </div>

                <div class="input-control">
                    <label>Phone Number</label>
                    <input type="text">
                </div>

                <div class="input-control">
                    <label>Quantity:</label>
                    <input type="number">
                </div>

                <div class="input-control">
                    <label>Description:</label>
                    <textarea></textarea>
                </div>

              <button class="btn">Place Order</button>
            </form>
            </div>

            <div class="form-container">
                <h2>Check Out: <i class="fa-solid fa-money-bill"></i></h2>

            <form>
                <h3>Name:</h3>
                <div class="input-control">
                    <label>Full name</label>
                    <input type="text">
                </div>

                <div class="input-control">
                    <label>Expiration Date:</label>
                    <input type="date">
                </div>

                <div class="input-control">
                    <label>Card number:</label>
                    <input type="text">
                </div>

                <div class="input-control">
                    <label>CVV:</label>
                    <input type="text">
                </div>

              <button class="btn">Pay</button>
            </form>

            </div>
        </div>

    </main>

</body>
</html>
